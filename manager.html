<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>句存 · 我的笔记</title>
  <link rel="stylesheet" href="manager.css">
</head>

<body>
  <nav class="navbar">
    <div class="nav-content">
      <div class="brand" aria-label="句存">
        <img class="brand-icon" src="icon.png" alt="">
        <span>句存</span>
      </div>

      <label class="search-box" for="search-input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="m20 20-3.5-3.5"></path>
        </svg>
        <input id="search-input" type="search" placeholder="搜索笔记内容、来源或分类" autocomplete="off">
      </label>

      <div class="toolbar">
        <button id="export-btn" class="button secondary" type="button" title="导出当前视图">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <path d="m7 10 5 5 5-5"></path>
            <path d="M12 15V3"></path>
          </svg>
          <span>导出</span>
        </button>
        <button id="new-note-btn" class="button primary" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><path d="M12 5v14M5 12h14"></path></svg>
          <span>新建笔记</span>
        </button>
      </div>
    </div>
  </nav>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-heading">
        <span>笔记分类</span>
        <button id="add-category-btn" class="icon-button" type="button" title="新建分类" aria-label="新建分类">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"></path></svg>
        </button>
      </div>
      <nav id="category-list" class="category-list" aria-label="笔记分类"></nav>
      <div class="sidebar-divider"></div>
      <button id="manage-categories-btn" class="smart-filter" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h10"></path></svg>
        管理分类
      </button>
    </aside>

    <main class="main-content">
      <header class="page-header">
        <div>
          <p class="eyebrow">我的知识库</p>
          <h1 id="view-title">全部笔记</h1>
          <p id="view-subtitle" class="subtitle">正在加载笔记…</p>
        </div>
        <div class="page-actions">
          <button id="manage-categories-top" class="button light" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h10"></path></svg>
            管理分类
          </button>
          <button id="batch-select-btn" class="button light batch-toggle" type="button" aria-pressed="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><path d="m15 18 2 2 4-5"></path></svg>
            <span>批量选择</span>
          </button>
        </div>
      </header>

      <div id="batch-actions" class="batch-actions" hidden>
        <div class="batch-selection-summary">
          <span class="batch-selection-icon" aria-hidden="true">✓</span>
          <strong id="batch-selected-count">已选择 0 条</strong>
        </div>
        <div class="batch-action-buttons">
          <button id="batch-select-all" class="batch-action-link" type="button">全选当前视图</button>
          <button id="batch-export" class="button secondary" type="button" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0 4-4m-4 4-4-4"></path><path d="M5 16v3h14v-3"></path></svg>
            导出所选
          </button>
          <button id="batch-delete" class="button danger" type="button" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M9 3h6l1 4H8l1-4Zm-2 4 .8 13h8.4L17 7"></path></svg>
            删除所选
          </button>
        </div>
      </div>

      <div class="filterbar">
        <div id="category-pills" class="filter-pills"></div>
        <div class="sort-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 7h12M4 7h.01M8 12h9M4 12h.01M8 17h6M4 17h.01"></path></svg>
          最近更新
        </div>
      </div>

      <section id="note-list" class="note-list" aria-live="polite"></section>
    </main>
  </div>

  <dialog id="category-dialog" class="modal">
    <form id="category-form" class="modal-card" method="dialog">
      <div class="modal-header">
        <div><p class="eyebrow">整理笔记</p><h2>新建分类</h2></div>
        <button class="modal-close" type="button" data-close-dialog="category-dialog" aria-label="关闭">×</button>
      </div>
      <label class="field-label" for="category-name">分类名称</label>
      <input id="category-name" class="text-field" maxlength="16" placeholder="例如：阅读、项目、旅行" required>
      <fieldset class="color-fieldset">
        <legend>分类颜色</legend>
        <div id="color-options" class="color-options"></div>
      </fieldset>
      <p id="category-error" class="form-error" role="alert"></p>
      <div class="modal-actions">
        <button class="button light" type="button" data-close-dialog="category-dialog">取消</button>
        <button class="button primary" type="submit">创建分类</button>
      </div>
    </form>
  </dialog>

  <dialog id="manage-dialog" class="modal wide-modal">
    <div class="modal-card">
      <div class="modal-header">
        <div><p class="eyebrow">分类设置</p><h2>管理分类</h2></div>
        <button class="modal-close" type="button" data-close-dialog="manage-dialog" aria-label="关闭">×</button>
      </div>
      <p class="modal-description">修改名称或颜色会立即保存。删除分类不会删除其中的笔记，这些笔记会移至“未分类”。</p>
      <div id="manage-category-list" class="manage-category-list"></div>
      <div class="modal-actions split-actions">
        <button id="manage-add-category" class="button light" type="button">＋ 新建分类</button>
        <button class="button primary" type="button" data-close-dialog="manage-dialog">完成</button>
      </div>
    </div>
  </dialog>

  <dialog id="note-dialog" class="modal">
    <form id="note-form" class="modal-card" method="dialog">
      <div class="modal-header">
        <div><p class="eyebrow">快速记录</p><h2>新建笔记</h2></div>
        <button class="modal-close" type="button" data-close-dialog="note-dialog" aria-label="关闭">×</button>
      </div>
      <label class="field-label" for="note-content-input">笔记内容</label>
      <textarea id="note-content-input" class="text-field note-textarea" rows="6" maxlength="10000" placeholder="写下此刻值得保存的内容…" required></textarea>
      <div class="two-column-fields">
        <label><span class="field-label">分类</span><select id="note-category-input" class="text-field"></select></label>
        <label><span class="field-label">来源（可选）</span><input id="note-source-input" class="text-field" type="url" placeholder="https://"></label>
      </div>
      <div class="modal-actions">
        <button class="button light" type="button" data-close-dialog="note-dialog">取消</button>
        <button class="button primary" type="submit">保存笔记</button>
      </div>
    </form>
  </dialog>

  <dialog id="confirm-dialog" class="confirm-dialog" aria-labelledby="confirm-title" aria-describedby="confirm-message">
    <form class="confirm-card" method="dialog">
      <button class="modal-close confirm-close" type="submit" value="cancel" aria-label="关闭">×</button>
      <div class="confirm-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9">
          <path d="M4 7h16"></path>
          <path d="M9 3h6l1 4H8l1-4Z"></path>
          <path d="m7 7 .8 13h8.4L17 7"></path>
          <path d="M10 11v5M14 11v5"></path>
        </svg>
      </div>
      <div class="confirm-copy">
        <p id="confirm-eyebrow" class="eyebrow">操作确认</p>
        <h2 id="confirm-title">确认操作</h2>
        <p id="confirm-message" class="confirm-message"></p>
      </div>
      <div class="modal-actions confirm-actions">
        <button id="confirm-cancel" class="button light" type="submit" value="cancel">取消</button>
        <button id="confirm-submit" class="button danger" type="submit" value="confirm">确认</button>
      </div>
    </form>
  </dialog>

  <dialog id="export-dialog" class="export-dialog">
    <div class="export-workbench">
      <header class="export-workbench-header">
        <div class="export-title-group">
          <span class="export-title-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0 4-4m-4 4-4-4"></path><path d="M5 16v3h14v-3"></path></svg>
          </span>
          <div><h2>导出笔记</h2><p>自定义排版并实时预览</p></div>
        </div>
        <button id="export-dialog-close" class="modal-close" type="button" aria-label="关闭">×</button>
      </header>

      <div class="export-format-tabs" role="tablist" aria-label="导出格式">
        <button class="export-format-tab active" type="button" role="tab" aria-selected="true" data-export-format="pdf">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2h9l4 4v16H6z"></path><path d="M14 2v5h5"></path></svg>PDF
        </button>
        <button class="export-format-tab" type="button" role="tab" aria-selected="false" data-export-format="word">Word</button>
        <button class="export-format-tab" type="button" role="tab" aria-selected="false" data-export-format="txt">TXT</button>
      </div>

      <div class="export-workbench-body">
        <aside class="export-controls" aria-label="导出设置">
          <section class="export-control-section">
            <h3>页面设置</h3>
            <label class="export-control-row"><span>纸张大小</span>
              <select id="export-paper-size"><option value="a4">A4</option><option value="letter">Letter</option><option value="a5">A5</option></select>
            </label>
            <div class="export-control-row"><span>方向</span>
              <div class="mini-segmented" role="group" aria-label="页面方向">
                <button class="active" type="button" data-export-option="orientation" data-value="portrait">纵向</button>
                <button type="button" data-export-option="orientation" data-value="landscape">横向</button>
              </div>
            </div>
            <label class="export-control-row"><span>页边距</span>
              <select id="export-margin"><option value="standard">标准</option><option value="compact">紧凑</option><option value="wide">宽松</option></select>
            </label>
          </section>

          <section class="export-control-section">
            <h3>排版样式</h3>
            <div class="template-grid" role="group" aria-label="排版模板">
              <button class="template-card active" type="button" data-export-option="template" data-value="minimal"><span class="template-thumb minimal-thumb"></span><b>简约</b></button>
              <button class="template-card" type="button" data-export-option="template" data-value="manuscript"><span class="template-thumb manuscript-thumb"></span><b>文稿</b></button>
              <button class="template-card" type="button" data-export-option="template" data-value="cards"><span class="template-thumb cards-thumb"></span><b>卡片</b></button>
            </div>
            <label class="export-control-row export-font-row"><span>字体</span>
              <span class="export-font-picker">
                <input id="export-font-family" type="text" value="系统字体" list="export-local-font-list" autocomplete="off" aria-describedby="export-font-hint">
                <button id="export-load-fonts" type="button" title="读取本机已安装字体">字体库</button>
              </span>
            </label>
            <datalist id="export-local-font-list">
              <option value="系统字体"></option><option value="宋体"></option>
            </datalist>
            <p id="export-font-hint" class="export-font-hint">可直接输入字体名称，或读取本机字体列表</p>
            <div class="export-control-row"><span>字体大小</span>
              <div class="number-stepper"><button id="export-font-decrease" type="button" aria-label="减小字号">−</button><output id="export-font-size">14</output><button id="export-font-increase" type="button" aria-label="增大字号">＋</button></div>
            </div>
            <label class="export-control-row"><span>行间距</span>
              <select id="export-line-height"><option value="comfortable">舒适</option><option value="compact">紧凑</option><option value="relaxed">宽松</option></select>
            </label>
          </section>

          <section class="export-control-section export-content-options">
            <h3>内容选项</h3>
            <label><span>显示分类</span><input id="export-include-category" type="checkbox" checked><i></i></label>
            <label><span>显示时间</span><input id="export-include-time" type="checkbox" checked><i></i></label>
            <label><span>显示来源</span><input id="export-include-source" type="checkbox" checked><i></i></label>
            <label><span>显示页码</span><input id="export-include-page-number" type="checkbox" checked><i></i></label>
            <button id="export-reset" class="export-reset" type="button">恢复默认设置</button>
          </section>
        </aside>

        <section class="export-preview-panel" aria-label="PDF 实时预览">
          <div id="export-preview-stage" class="export-preview-stage">
            <canvas id="export-preview-canvas" aria-label="导出页面预览"></canvas>
            <div id="export-next-page" class="export-next-page" aria-hidden="true"></div>
          </div>
          <div class="preview-zoom" aria-label="预览缩放">
            <button id="preview-zoom-out" type="button" aria-label="缩小">−</button><output id="preview-zoom-value">75%</output><button id="preview-zoom-in" type="button" aria-label="放大">＋</button>
          </div>
        </section>
      </div>

      <footer class="export-workbench-footer">
        <div><strong id="export-summary">将导出 0 条笔记 · 预计 0 页</strong><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="10" width="14" height="11" rx="2"></rect><path d="M8 10V7a4 4 0 0 1 8 0v3"></path></svg>文件仅在本地生成</span></div>
        <div class="export-footer-actions">
          <button id="export-cancel" class="button light" type="button">取消</button>
          <button id="export-confirm" class="button primary export-confirm" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0 4-4m-4 4-4-4"></path><path d="M5 16v3h14v-3"></path></svg><span>导出 PDF</span>
          </button>
        </div>
      </footer>
    </div>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="notes-store.js"></script>
  <script src="pdf-export.js"></script>
  <script src="manager.js"></script>
</body>

</html>
