<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的笔记</title>
  <link rel="stylesheet" href="manager.css">
</head>

<body>

  <nav class="navbar">
    <div class="nav-content">
      <div class="brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
        </svg>
        <span>句存</span>
      </div>

      <div class="toolbar">
        <div class="action-group">
          <div class="export-menu-wrapper">
            <button id="export-btn" class="btn-primary" title="导出笔记">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
              </svg>
              导出
            </button>
            <div id="export-menu" class="export-menu frosted">
              <div class="export-options-container">
                <button class="export-option" data-format="txt">
                  <span class="format-name">TXT</span>
                  <span class="format-desc">纯文本格式</span>
                </button>
                <button class="export-option" data-format="word">
                  <span class="format-name">Word</span>
                  <span class="format-desc">Microsoft Word</span>
                </button>
                <button class="export-option" data-format="pdf">
                  <span class="format-name">PDF</span>
                  <span class="format-desc">便携式文档</span>
                </button>
              </div>
              <div class="export-scope">
                <button id="choose-export-notes" class="export-scope-btn" type="button">
                  <span>选择导出笔记</span>
                  <span id="export-selection-summary" class="export-selection-summary">全部 0 条</span>
                </button>
              </div>
              <div class="export-settings">
                <label class="export-checkbox">
                  <input type="checkbox" id="export-include-time" checked>
                  <span>包含时间</span>
                </label>
                <label class="export-checkbox">
                  <input type="checkbox" id="export-include-source" checked>
                  <span>包含来源</span>
                </label>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="container frosted">
    <div class="header-placeholder"></div>
    <div class="content-wrapper">
      <div class="list-header">
        <h2>全部笔记</h2>
        <button id="clear-all" class="btn-text-danger">清空</button>
      </div>

      <div class="search-wrapper" role="search">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="search-input" type="search" placeholder="搜索正文、来源或时间" autocomplete="off" aria-label="搜索笔记">
        <button id="search-clear" class="search-clear" type="button" aria-label="清除搜索" title="清除搜索" hidden>×</button>
      </div>
      <p id="search-status" class="search-status" aria-live="polite"></p>

      <div id="note-list" class="grid-layout">
      </div>
    </div>
  </main>

  <div id="export-selection-modal" class="modal-overlay" hidden>
    <section class="selection-modal" role="dialog" aria-modal="true" aria-labelledby="export-selection-title">
      <div class="selection-modal-header">
        <div>
          <h3 id="export-selection-title">选择导出笔记</h3>
          <p id="export-selection-count">已选 0 / 0 条</p>
        </div>
        <button id="export-selection-close" class="modal-close" type="button" aria-label="关闭">×</button>
      </div>
      <div class="selection-modal-toolbar">
        <button id="export-select-all" class="btn-secondary" type="button">全选</button>
        <button id="export-select-none" class="btn-secondary" type="button">清空选择</button>
      </div>
      <div id="export-note-options" class="export-note-options"></div>
      <div class="selection-modal-footer">
        <button id="export-selection-cancel" class="btn-secondary" type="button">取消</button>
        <button id="export-selection-apply" class="btn-primary" type="button">应用选择</button>
      </div>
    </section>
  </div>

  <script src="note-utils.js"></script>
  <script src="manager.js"></script>
</body>

</html>
